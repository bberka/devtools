<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline | Dev Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        width: min(100% - 32px, 560px);
        padding: 32px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgb(15 23 42 / 0.08);
      }

      img {
        width: 64px;
        height: 64px;
        display: block;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #475569;
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 24px;
        color: #0369a1;
        font-weight: 650;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #020617;
          color: #f8fafc;
        }

        main {
          background: #0f172a;
          border-color: #1e293b;
          box-shadow: none;
        }

        p {
          color: #cbd5e1;
        }

        a {
          color: #7dd3fc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/app-icon.svg" alt="" />
      <h1>You are offline</h1>
      <p>
        Dev Tools is installed and ready for cached tools. Reconnect once to load
        a tool that has not been cached yet.
      </p>
      <a href="/">Open cached tools</a>
    </main>
  </body>
</html>
